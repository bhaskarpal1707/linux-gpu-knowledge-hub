<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CmdHub — Command Explorer</title>
    <meta name="description" content="Browse and explore Linux, GPU, AI/ML, Docker, and debugging commands by category. Filter by complexity and search within categories.">
    <meta name="keywords" content="Linux commands, GPU commands, AI/ML tools, Docker, command explorer, cheat sheet">
    <meta name="author" content="CmdHub">
    <meta name="theme-color" content="#0a0e17">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="../assets/css/styles.css">
</head>
<body>
    <div class="app-layout">
        <!-- SIDEBAR -->
        <aside class="sidebar" id="sidebar" role="navigation" aria-label="Main navigation">
            <div class="sidebar-header">
                <a href="../index.html" class="sidebar-logo" aria-label="CmdHub home">
                    <div class="sidebar-logo-main">
                        <i class="bi bi-terminal-fill" style="color: var(--accent-blue); font-size: 1.5rem;" aria-hidden="true"></i>
                        <span class="sidebar-logo-text">CmdHub</span>
                    </div>
                    <span class="sidebar-logo-credit">Developed by Bhaskar Pal</span>
                </a>
                <button class="btn btn--icon sidebar-toggle" id="sidebar-toggle" title="Toggle sidebar" aria-label="Toggle sidebar" aria-expanded="true" aria-controls="sidebar">
                    <i class="bi bi-layout-sidebar-inset" aria-hidden="true"></i>
                </button>
            </div>
            <nav class="sidebar-nav" id="sidebar-nav" aria-label="Category navigation">
                <!-- Populated by app.js -->
            </nav>
        </aside>

        <!-- MAIN CONTENT -->
        <main class="main-content" id="main-content" role="main">
            <!-- Mobile header -->
            <header class="mobile-header" role="banner">
                <button class="btn btn--icon mobile-menu-toggle" id="mobile-menu-toggle" aria-label="Open navigation menu" aria-expanded="false" aria-controls="sidebar">
                    <i class="bi bi-list" aria-hidden="true"></i>
                </button>
                <span class="mobile-logo" aria-hidden="true">⚡ CmdHub</span>
            </header>

            <!-- BREADCRUMB -->
            <nav class="breadcrumb-nav" id="breadcrumb-nav" aria-label="Breadcrumb">
                <ol class="breadcrumb" id="breadcrumb">
                    <li class="breadcrumb-item">
                        <a href="../index.html" aria-label="Go to Dashboard"><i class="bi bi-house-door" aria-hidden="true"></i> Dashboard</a>
                    </li>
                    <li class="breadcrumb-separator" aria-hidden="true">
                        <i class="bi bi-chevron-right"></i>
                    </li>
                    <li class="breadcrumb-item breadcrumb-item--active" id="breadcrumb-current" aria-current="page">
                        All Commands
                    </li>
                </ol>
            </nav>

            <!-- CATEGORY INFO HEADER -->
            <section class="explorer-header" id="explorer-header" aria-labelledby="explorer-title">
                <div class="explorer-header-content">
                    <div class="explorer-header-icon" id="explorer-header-icon" aria-hidden="true">
                        <i class="bi bi-collection"></i>
                    </div>
                    <div class="explorer-header-info">
                        <h1 class="explorer-title" id="explorer-title">All Commands</h1>
                        <p class="explorer-description" id="explorer-description">Browse the complete command library across all categories.</p>
                        <div class="explorer-meta" id="explorer-meta">
                            <span class="explorer-meta-item" id="explorer-command-count">
                                <i class="bi bi-terminal" aria-hidden="true"></i>
                                <span>Loading commands...</span>
                            </span>
                        </div>
                    </div>
                </div>
            </section>

            <!-- FILTER CONTROLS -->
            <section class="explorer-controls" aria-label="Filter and sort controls">
                <div class="explorer-controls-inner">
                    <!-- Search within category -->
                    <div class="explorer-search" role="search" aria-label="Search within current view">
                        <div class="search-bar search-bar--compact">
                            <i class="bi bi-search search-icon" aria-hidden="true"></i>
                            <input type="text" id="explorer-search-input" placeholder="Filter commands..." autocomplete="off" spellcheck="false" aria-label="Filter commands in current view">
                        </div>
                    </div>

                    <!-- Sort control -->
                    <div class="explorer-sort">
                        <label for="sort-select" class="explorer-control-label">
                            <i class="bi bi-sort-alpha-down" aria-hidden="true"></i> Sort
                        </label>
                        <select id="sort-select" class="explorer-select" aria-label="Sort commands">
                            <option value="alphabetical">Alphabetical (A–Z)</option>
                            <option value="alphabetical-desc">Alphabetical (Z–A)</option>
                            <option value="complexity-asc">Complexity (Easy → Hard)</option>
                            <option value="complexity-desc">Complexity (Hard → Easy)</option>
                        </select>
                    </div>

                    <!-- Complexity filter -->
                    <div class="explorer-complexity-filter" role="group" aria-label="Filter by complexity">
                        <label class="explorer-control-label">
                            <i class="bi bi-funnel" aria-hidden="true"></i> Complexity
                        </label>
                        <div class="explorer-filter-pills" id="complexity-filter-pills">
                            <button class="filter-pill filter-pill--active" data-complexity="all" aria-pressed="true" id="filter-all">All</button>
                            <button class="filter-pill" data-complexity="beginner" aria-pressed="false" id="filter-beginner">
                                <span class="complexity-dot complexity-dot--beginner" aria-hidden="true"></span> Beginner
                            </button>
                            <button class="filter-pill" data-complexity="intermediate" aria-pressed="false" id="filter-intermediate">
                                <span class="complexity-dot complexity-dot--intermediate" aria-hidden="true"></span> Intermediate
                            </button>
                            <button class="filter-pill" data-complexity="advanced" aria-pressed="false" id="filter-advanced">
                                <span class="complexity-dot complexity-dot--advanced" aria-hidden="true"></span> Advanced
                            </button>
                        </div>
                    </div>

                    <!-- View toggle -->
                    <div class="explorer-view-toggle" role="group" aria-label="View mode">
                        <button class="btn btn--icon view-toggle-btn view-toggle-btn--active" id="view-grid-btn" title="Grid view" aria-label="Grid view" aria-pressed="true">
                            <i class="bi bi-grid-3x2-gap" aria-hidden="true"></i>
                        </button>
                        <button class="btn btn--icon view-toggle-btn" id="view-list-btn" title="List view" aria-label="List view" aria-pressed="false">
                            <i class="bi bi-list-ul" aria-hidden="true"></i>
                        </button>
                    </div>
                </div>
            </section>

            <!-- RESULTS COUNT -->
            <div class="explorer-results-info" id="explorer-results-info" aria-live="polite" aria-atomic="true">
                <!-- Populated by JS: "Showing X of Y commands" -->
            </div>

            <!-- COMMAND CARDS GRID -->
            <section class="explorer-grid-container" aria-labelledby="explorer-title">
                <div class="explorer-grid" id="explorer-grid" role="list" aria-label="Command cards">
                    <!-- Populated by JS -->
                </div>

                <!-- Empty state -->
                <div class="explorer-empty" id="explorer-empty" hidden>
                    <i class="bi bi-search" aria-hidden="true"></i>
                    <p class="explorer-empty-title">No commands found</p>
                    <p class="explorer-empty-subtitle">Try adjusting your search or filter criteria.</p>
                </div>
            </section>

            <!-- Command Detail Modal -->
            <div class="modal-overlay" id="command-modal-overlay" role="dialog" aria-modal="true" aria-labelledby="modal-command-title" hidden>
                <div class="modal-content" id="command-detail-panel">
                    <button class="btn btn--icon modal-close" id="modal-close" aria-label="Close command detail">
                        <i class="bi bi-x-lg" aria-hidden="true"></i>
                    </button>
                    <div id="command-detail-content" role="document">
                        <!-- Populated by JS -->
                    </div>
                </div>
            </div>

            <!-- Footer -->
            <footer class="app-footer" role="contentinfo">
                <div class="footer-content">
                    <p class="footer-copyright">&copy; 2026 CmdHub. All rights reserved.</p>
                    <p class="footer-credit">Developed by <a href="https://github.com/bhaskarpal1707" target="_blank" rel="noopener noreferrer">Bhaskar Pal</a></p>
                </div>
            </footer>
        </main>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/fuse.js@7.4.1/dist/fuse.min.js"></script>
    <script src="../assets/js/app.js"></script>
    <script src="../assets/js/search.js"></script>
</body>
</html>
